<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pomodoro</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="app-header">
      <div>
        <p class="eyebrow">Pomodoro</p>
        <h1>Foco de hoje</h1>
      </div>
      <div class="streak" aria-label="Sequência de dias">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2c1 3-2 4-2 7a4 4 0 0 0 8 0c0-2-1-3-1-3s1 4-2 4-1-3 0-5c1-2-1-4-3-3z"/>
        </svg>
        <span id="streakCount">0</span>
      </div>
    </header>

    <div class="pills" id="pills">
      <div class="pill" data-pill="focus">
        <span class="pill-count" id="focusCount">0</span>
        <span class="pill-label">Foco</span>
      </div>
      <div class="pill" data-pill="short-break">
        <span class="pill-count" id="shortCount">0</span>
        <span class="pill-label">Pausa curta</span>
      </div>
      <div class="pill" data-pill="long-break">
        <span class="pill-count" id="longCount">0</span>
        <span class="pill-label">Pausa longa</span>
      </div>
    </div>

    <section id="taskView">
      <div class="add-row">
        <input id="taskInput" class="input" placeholder="Nome da tarefa" autocomplete="off" />
        <button id="addBtn" class="btn btn-primary">Adicionar</button>
      </div>
      <p id="emptyState" class="muted">Nenhuma tarefa ainda. Adicione a primeira acima.</p>
      <div id="taskList" class="task-list"></div>
    </section>

    <section id="timerView" class="hidden">
      <p id="timerLabel" class="muted timer-label"></p>

      <div class="ring-wrap ring-focus" id="ringFocus">
        <svg width="240" height="240" viewBox="0 0 240 240">
          <circle cx="120" cy="120" r="108" class="ring-track" />
          <circle cx="120" cy="120" r="108" class="ring-progress" id="ringFocusProgress" />
        </svg>
        <div class="ring-time" id="ringFocusTime">25:00</div>
      </div>

      <div class="ring-wrap ring-break hidden" id="ringBreak">
        <svg width="340" height="340" viewBox="0 0 340 340">
          <circle cx="170" cy="170" r="155" class="ring-track" />
          <circle cx="170" cy="170" r="155" class="ring-progress ring-progress-break" id="ringBreakProgress" />
        </svg>
        <div class="ring-time ring-time-lg" id="ringBreakTime">10:00</div>
      </div>

      <p id="justFinished" class="just-finished hidden"></p>

      <div class="controls">
        <button id="toggleBtn" class="btn btn-primary">Pausar</button>
        <button id="stopBtn" class="btn">Encerrar</button>
      </div>
    </section>

    <div id="modalOverlay" class="modal-overlay hidden">
      <div class="modal">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="modal-icon">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
        <p class="modal-title">Pausa concluída</p>
        <p class="muted">Pronto para voltar às tarefas?</p>
        <button id="backBtn" class="btn btn-primary">Voltar às tarefas</button>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
